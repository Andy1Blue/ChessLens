# fly.toml app configuration file generated for chesslens on 2026-05-18T14:41:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chesslens'
primary_region = 'ams'

[build]

[env]
  PORT = '8080'

[processes]
  app = 'node index.js'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
